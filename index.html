    <h1>QUIZ SOBRE ARCANE!!!</h1>

    <h1>Pergunta 1</h1>
    <h2>1.Se você fosse uma peça de uma máquina, qual papel você gostaria de desempenhar?</h2>
    <label><input type="radio" name="pergunta1">A) A peça que vai direto ao ponto, sem rodeios, e garante que tudo aconteça rapidamente.</label>
    <br>
    <label><input type="radio" name="pergunta1">B) A peça imprevisível que pode sair de controle a qualquer momento e bagunçar tudo!</label>
    <br>
    <label><input type="radio" name="pergunta1">C) A peça que mantém tudo funcionando de forma suave e sem falhas, com precisão.</label>
    <br>
    <label><input type="radio" name="pergunta1">D) A peça que conecta todas as outras, garantindo que nada saia do lugar e todo mundo se entenda.
    </label>

    <h1>Pergunta 2</h1>
    <h2>2.Você ganha um bilhete de trem para uma jornada misteriosa. Você embarca com:</h2>
    <label><input type="radio" name="pergunta2">A)  Uma mochila cheia de suprimentos e uma atitude destemida, pronta para qualquer aventura!</label>
    <br>
    <label><input type="radio" name="pergunta2">B) Um sorriso no rosto e uma pilha de invenções malucas para testar durante o caminho.</label>
    <br>
    <label><input type="radio" name="pergunta2">C)Um mapa detalhado e um plano para garantir que eu saiba exatamente onde estou indo.</label>
    <br>
    <label><input type="radio" name="pergunta2">D) Um livro e uma lupa, pronto para resolver qualquer mistério que surgir ao longo da viagem.
    </label>

    <h1>Pergunta 3</h1>
    <h2>3.Se você tivesse que escolher um novo nome de super-herói, qual seria?</h2>
    <label><input type="radio" name="pergunta3">A)Impacto – Porque quando eu entro em cena, as coisas nunca ficam no lugar!</label>
    <br>
    <label><input type="radio" name="pergunta3">B) Caos Cósmico – Eu sou a prova de que as estrelas podem brilhar onde você menos espera.</label>
    <br>
    <label><input type="radio" name="pergunta3">C)Mestre da Mente – Eu resolvo tudo, com um plano e uma mente afiada.</label>
    <br>
    <label><input type="radio" name="pergunta3">D) Equilíbrio – Porque eu sempre busco manter as coisas justas e equilibradas, não importa o que aconteça.
    </label>
